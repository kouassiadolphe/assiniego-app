<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a4b6e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AssinieGo">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    <title>AssinieGo - Votre expérience à Assinie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <i class="fas fa-umbrella-beach"></i>
                <span>AssinieGo</span>
            </div>
            <div class="splash-wave">
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
            </div>
            <p class="splash-text">Votre week-end à Assinie commence ici...</p>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app-container hidden">
        <!-- Navigation Bottom Bar -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-page="home">
                <i class="fas fa-home"></i>
                <span>Accueil</span>
            </div>
            <div class="nav-item" data-page="activities">
                <i class="fas fa-water"></i>
                <span>Activités</span>
            </div>
            <div class="nav-item" data-page="booking">
                <i class="fas fa-calendar-alt"></i>
                <span>Réserver</span>
            </div>
            <div class="nav-item" data-page="profile">
                <i class="fas fa-user"></i>
                <span>Profil</span>
            </div>
        </nav>

        <!-- Pages Container -->
        <div class="pages-container">
            <div id="home-page" class="page active-page"></div>
            <div id="activities-page" class="page"></div>
            <div id="booking-page" class="page"></div>
            <div id="profile-page" class="page"></div>
        </div>

        <!-- Floating Action Button -->
        <div class="fab" id="fab">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <script src="js/offline.js"></script>
</body>
</html>
